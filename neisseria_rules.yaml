#
# Your task: An infectious disease specialist wants the system to
# handle Neisseria infections. Fill in the two rules below.

- name: R13
  text: Gram-negative cocci suggest Neisseria
  premises:
    - [gram_stain, is, gram-negative]
    - [morphology, is, coccus]
  conclusion: [identity, neisseria]
