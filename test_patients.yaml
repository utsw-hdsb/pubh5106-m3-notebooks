# Test Patients for Statin Guideline
# ===================================
# Each patient has a name, description, and a set of clinical facts.
# CFs use the 0-10 scale (clinician-reported certainty).
# The inference engine classifies each patient and recommends therapy.

- name: "Mr. Johnson"
  description: "62-year-old man with prior MI (stent placed 2019), LDL 95 mg/dL, on moderate-intensity statin"
  facts:
    has_ascvd: ["yes", 10]
    age_group: ["40-75", 10]
    ldl_ge_70: ["yes", 10]
    ldl_ge_190: ["no", 10]
    has_diabetes: ["no", 10]
    has_risk_enhancers: ["yes", 10]

